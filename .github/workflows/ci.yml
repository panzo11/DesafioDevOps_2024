name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .
        docker push docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Minikube
      run: |
        curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        sudo install minikube-linux-amd64 /usr/local/bin/minikube
        minikube start --driver=docker

    - name: Set up kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    - name: Verify Minikube Status
      run: |
        minikube status

    - name: Configure Kubernetes Context
      run: |
        kubectl config set-credentials myapp-user --username=${{ secrets.K8S_USERNAME }} --password=${{ secrets.K8S_PASSWORD }}
        kubectl config set-context myapp-context --cluster=minikube --namespace=default --user=myapp-user
        kubectl config use-context myapp-context

    - name: Wait for Minikube to be Ready
      run: |
        for i in {1..10}; do
          kubectl get nodes && break || sleep 10
        done

    - name: Verify API Server Status
      run: |
        kubectl get pods -n kube-system | grep kube-apiserver

    - name: Create ClusterRoleBinding
      run: |
        kubectl create clusterrolebinding myapp-admin --clusterrole=cluster-admin --user=myapp-user

    - name: Create RoleBinding
      run: |
        cat <<EOF | kubectl apply -f - --validate=false
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: myapp-rolebinding
          namespace: default
        subjects:
        - kind: User
          name: myapp-user
          apiGroup: rbac.authorization.k8s.io
        roleRef:
          kind: Role
          name: admin
          apiGroup: rbac.authorization.k8s.io
        EOF

    - name: Create Kubernetes Secret
      run: |
        kubectl create secret generic myapp-secret \
          --from-literal=username=${{ secrets.K8S_USERNAME }} \
          --from-literal=password=${{ secrets.K8S_PASSWORD }} --validate=false

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml --validate=false
        kubectl apply -f service.yaml --validate=false

    - name: Expose Service
      run: |
        kubectl expose deployment myapp-deployment --type=NodePort --port=3000 --validate=false

    - name: Install Kubernetes Dashboard
      run: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml

    - name: Create Admin User for Dashboard
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: admin-user
          namespace: kubernetes-dashboard
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: admin-user
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
        - kind: ServiceAccount
          name: admin-user
          namespace: kubernetes-dashboard
        EOF

    - name: Get Dashboard Access Token
      id: get-token
      run: |
        TOKEN=$(kubectl -n kubernetes-dashboard create token admin-user)
        echo "::set-output name=token::$TOKEN"

    - name: Output Dashboard URL and Token
      run: |
        echo "Dashboard URL: http://localhost:8001/api/v1/namespaces/kubernetes-dashboard/services/https:kubernetes-dashboard:/proxy/"
        echo "Access Token: ${{ steps.get-token.outputs.token }}"
