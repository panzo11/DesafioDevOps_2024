name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .
        docker push docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Docker Swarm
      run: |
        docker swarm init

    - name: Create docker-compose.yml
      run: |
        cat <<EOF > docker-compose.yml
        version: '3.7'
        services:
          myapp:
            image: docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
            ports:
              - "3000:3000"
            deploy:
              replicas: 4
        EOF

    - name: Deploy Stack to Swarm
      run: |
        docker stack deploy -c docker-compose.yml myapp-stack

    - name: Verify Deployment
      run: |
        docker service ls
        docker service ps myapp-stack_myapp
