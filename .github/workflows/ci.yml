name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .
        docker push docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Minikube
      run: |
        curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        sudo install minikube-linux-amd64 /usr/local/bin/minikube
        minikube start --driver=docker

    - name: Set up kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    - name: Configure Kubernetes Context
      run: |
        kubectl config set-credentials myapp-user --username=${{ secrets.K8S_USERNAME }} --password=${{ secrets.K8S_PASSWORD }}
        kubectl config set-context myapp-context --cluster=minikube --namespace=default --user=myapp-user
        kubectl config use-context myapp-context

    - name: Create RoleBinding
      run: |
        cat <<EOF | kubectl apply -f - --validate=false
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: myapp-rolebinding
          namespace: default
        subjects:
        - kind: User
          name: myapp-user
          apiGroup: rbac.authorization.k8s.io
        roleRef:
          kind: Role
          name: admin
          apiGroup: rbac.authorization.k8s.io
        EOF

    - name: Create Kubernetes Secret
      run: |
        kubectl create secret generic myapp-secret \
          --from-literal=username=${{ secrets.K8S_USERNAME }} \
          --from-literal=password=${{ secrets.K8S_PASSWORD }} --validate=false

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml --validate=false
        kubectl apply -f service.yaml --validate=false

    - name: Expose Service
      run: |
        kubectl expose deployment myapp-deployment --type=NodePort --port=3000 --validate=false
