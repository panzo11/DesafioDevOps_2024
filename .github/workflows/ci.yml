name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .
        docker push docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Deploy to Portainer
      env:
        PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
        PORTAINER_ACCESS_TOKEN: ${{ secrets.PORTAINER_ACCESS_TOKEN }}
      run: |
        curl -X POST "$PORTAINER_URL/api/endpoints/1/docker/containers/create" \
          -H "Authorization: Bearer $PORTAINER_ACCESS_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
                "Image": "docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}",
                "name": "myapp-container",
                "HostConfig": {
                  "PortBindings": {
                    "3000/tcp": [
                      {
                        "HostPort": "9000"
                      }
                    ]
                  }
                }
              }'
        curl -X POST "$PORTAINER_URL/api/endpoints/1/docker/containers/myapp-container/start" \
          -H "Authorization: Bearer $PORTAINER_ACCESS_TOKEN"
