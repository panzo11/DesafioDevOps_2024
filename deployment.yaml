apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
spec:
  replicas: 7
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
        ports:
        - containerPort: 3000
